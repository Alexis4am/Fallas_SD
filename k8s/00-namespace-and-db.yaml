apiVersion: v1
kind: Namespace
metadata:
  name: ticketing

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  namespace: ticketing
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS seats (
      event_id        TEXT PRIMARY KEY,
      total_seats     INT NOT NULL,
      available_seats INT NOT NULL CHECK (available_seats >= 0)
      -- CHECK >= 0: defensa en profundidad contra overselling
    );

    CREATE TABLE IF NOT EXISTS reservations (
      id         TEXT PRIMARY KEY,
      event_id   TEXT NOT NULL,
      user_id    TEXT NOT NULL,
      quantity   INT  NOT NULL,
      payment_id TEXT,
      status     TEXT NOT NULL,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Dead-letter queue: correos no entregados se guardan aquí
    -- y un worker los reintenta cada 15s en vez de perderlos.
    CREATE TABLE IF NOT EXISTS dead_letter_queue (
      id             TEXT PRIMARY KEY,
      reservation_id TEXT NOT NULL,
      payload        JSONB NOT NULL,
      error          TEXT,
      created_at     TIMESTAMPTZ DEFAULT NOW()
    );

    INSERT INTO seats (event_id, total_seats, available_seats)
    VALUES ('concierto-2026', 100, 100)
    ON CONFLICT (event_id) DO NOTHING;

    -- Evento de un solo asiento para la demo de condición de carrera
    INSERT INTO seats (event_id, total_seats, available_seats)
    VALUES ('ultimo-asiento', 1, 1)
    ON CONFLICT (event_id) DO NOTHING;

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Fijado al Sitio A. En producción sería un cluster replicado.
      nodeSelector:
        sitio: sitio-a
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: ticketing
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
      volumes:
        - name: init
          configMap:
            name: db-init
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ticketing
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432