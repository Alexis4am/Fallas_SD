apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: ticketing
  labels:
    app: inventory
    tier: critical
spec:
  replicas: 2
  # maxSurge: 0 evita deadlock con topologySpread (DoNotSchedule):
  # con 2 réplicas y 2 nodos no hay espacio para un 3er pod temporal.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
        tier: critical
    spec:
      # Garantiza una réplica por sitio (regla dura: DoNotSchedule).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: sitio
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: inventory
      # Refuerzo: nunca dos pods de inventory en el mismo nodo físico.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: inventory
              topologyKey: kubernetes.io/hostname
      containers:
        - name: inventory
          image: ticketing/inventory:v1
          imagePullPolicy: IfNotPresent
          env:
            # Downward API: el pod expone su nombre y nodo en cada respuesta,
            # lo que permite verificar visualmente el balanceo entre sitios.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: ticketing
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          # readinessProbe: cuando falla, k8s saca el pod del Service
          # sin reiniciarlo, permitiendo que el retry de Reservas
          # caiga en la réplica sana del otro sitio.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 2
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: ticketing
spec:
  selector:
    app: inventory
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inventory-pdb
  namespace: ticketing
spec:
  # Durante operaciones voluntarias (drain, upgrade), mínimo 1 pod activo.
  minAvailable: 1
  selector:
    matchLabels:
      app: inventory