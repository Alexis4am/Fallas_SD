# =============================================================
#  02 - RESERVAS, PAGOS, NOTIFICACIONES Y GATEWAY
# =============================================================

# =============================================================
#  SERVICIO DE RESERVAS (el core)
# =============================================================
#  Tambien lo replicamos entre los dos sitios (2 replicas).
#  Asi tenemos DOS componentes criticos distribuidos, no uno.
#  La rubrica solo pide uno, pero esto es puntos extra.
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservations
  namespace: ticketing
  labels:
    app: reservations
    tier: critical
spec:
  replicas: 2
  # Misma estrategia que inventory: sin esto el rollout se atasca,
  # porque el topologySpread (DoNotSchedule) no deja crear un 3er pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: reservations
  template:
    metadata:
      labels:
        app: reservations
        tier: critical
    spec:
      # Igual que inventory: una replica en cada sitio.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: sitio
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: reservations
      containers:
        - name: reservations
          image: ticketing/reservations:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: INVENTORY_URL
              value: http://inventory:3000
            - name: PAYMENTS_URL
              value: http://payments:3000
            - name: NOTIFICATIONS_URL
              value: http://notifications:3000
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: ticketing
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: reservations
  namespace: ticketing
spec:
  selector:
    app: reservations
  ports:
    - port: 3000
      targetPort: 3000

---
# =============================================================
#  SERVICIO DE PAGOS (stub)
# =============================================================
#  Una sola replica. Lo ponemos en el sitio B a proposito, para
#  que el diagrama muestre componentes en AMBOS lados.
#
#  NO lo replicamos porque en la demo del "circuito abierto"
#  queremos poder activarle el modo lento con UN SOLO curl.
#  Con dos replicas tendriamos que activarlo en las dos.
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      nodeSelector:
        sitio: sitio-b       # <- Pagos vive en el sitio B
      containers:
        - name: payments
          image: ticketing/payments:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: SLOW_LATENCY_MS
              value: "20000"    # los 20 segundos que pide el enunciado
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: ticketing
spec:
  selector:
    app: payments
  ports:
    - port: 3000
      targetPort: 3000

---
# =============================================================
#  SERVICIO DE NOTIFICACIONES (stub NO CRITICO)
# =============================================================
#  Este es el que APAGAMOS ENTERO en la demo del "Correo Perdido":
#     kubectl scale deploy/notifications --replicas=0 -n ticketing
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: ticketing
  labels:
    tier: non-critical      # <- explicitamente NO critico
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
        tier: non-critical
    spec:
      nodeSelector:
        sitio: sitio-b
      containers:
        - name: notifications
          image: ticketing/notifications:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: FAILURE_RATE
              value: "0.15"    # 15% de fallos incluso estando "sano"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: ticketing
spec:
  selector:
    app: notifications
  ports:
    - port: 3000
      targetPort: 3000

---
# =============================================================
#  API GATEWAY (la puerta de entrada)
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      nodeSelector:
        sitio: sitio-a
      containers:
        - name: gateway
          image: ticketing/gateway:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: RESERVATIONS_URL
              value: http://reservations:3000
            - name: INVENTORY_URL
              value: http://inventory:3000
            # ---- EL LIMITE DEL BULKHEAD ----
            # Solo 20 peticiones concurrentes. Lo dejamos BAJO a proposito
            # para que en la demo del "Diluvio" se vea claramente como
            # empieza a rechazar con 429 en vez de colapsar.
            - name: MAX_CONCURRENT
              value: "20"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
# =============================================================
#  EL SERVICE DEL GATEWAY: NodePort
# =============================================================
#  NodePort = "abre un puerto en el nodo para que se pueda entrar
#  desde FUERA del cluster".
#
#  Combinado con el extraPortMappings del kind-cluster.yaml,
#  esto hace que puedas hacer, desde tu laptop:
#       curl http://localhost:30080/healthz
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ticketing
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
