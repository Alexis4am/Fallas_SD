apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservations
  namespace: ticketing
  labels:
    app: reservations
    tier: critical
spec:
  replicas: 2
  # Misma estrategia que inventory: evita deadlock con topologySpread.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: reservations
  template:
    metadata:
      labels:
        app: reservations
        tier: critical
    spec:
      # Una réplica por sitio, igual que inventory.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: sitio
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: reservations
      containers:
        - name: reservations
          image: ticketing/reservations:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: INVENTORY_URL
              value: http://inventory:3000
            - name: PAYMENTS_URL
              value: http://payments:3000
            - name: NOTIFICATIONS_URL
              value: http://notifications:3000
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: ticketing
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: reservations
  namespace: ticketing
spec:
  selector:
    app: reservations
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      # Sitio B: una sola réplica facilita activar el modo lento
      # con un único curl durante la demo del circuit breaker.
      nodeSelector:
        sitio: sitio-b
      containers:
        - name: payments
          image: ticketing/payments:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: SLOW_LATENCY_MS
              value: "20000"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: ticketing
spec:
  selector:
    app: payments
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: ticketing
  labels:
    tier: non-critical
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
        tier: non-critical
    spec:
      nodeSelector:
        sitio: sitio-b
      containers:
        - name: notifications
          image: ticketing/notifications:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: FAILURE_RATE
              value: "0.15"    # 15% de fallos para simular comportamiento realista
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: ticketing
spec:
  selector:
    app: notifications
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      nodeSelector:
        sitio: sitio-a
      containers:
        - name: gateway
          image: ticketing/gateway:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: RESERVATIONS_URL
              value: http://reservations:3000
            - name: INVENTORY_URL
              value: http://inventory:3000
            # Bulkhead: máximo 20 peticiones concurrentes.
            # Bajo a propósito para que la demo del Diluvio muestre 429
            # en vez de colapso total.
            - name: MAX_CONCURRENT
              value: "20"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ticketing
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080